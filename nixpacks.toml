[phases.setup]
nixPkgs = ['php83', 'php83Packages.composer', 'nodejs_22', 'nginx', 'libmysqlclient']

[phases.install]
dependsOn = ['setup']
commands = [
    'composer install --no-dev --optimize-autoloader',
    'npm install'
]

[phases.build]
dependsOn = ['install']
commands = [
    'npm run build'
]
